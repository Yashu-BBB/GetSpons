<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pitches — getSpons</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { background: var(--gray-50); }

    /* ── Summary bar ── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .sum-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .sum-num   { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
    .sum-label { font-size: 0.72rem; color: var(--gray-500); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

    /* ── Pitch rows ── */
    .pitch-row {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      transition: box-shadow 0.2s;
    }
    .pitch-row:hover { box-shadow: var(--shadow-sm); }

    .pitch-row-brand   { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .pitch-row-subject { font-size: 0.82rem; color: var(--gray-500); margin-bottom: 8px; }
    .pitch-row-date    { font-size: 0.72rem; color: var(--gray-300); }

    .pitch-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

    .status-select {
      font-size: 0.75rem;
      font-weight: 600;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      color: var(--gray-700);
      background: var(--white);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .status-select:focus { outline: none; border-color: var(--purple); }

    .expand-btn {
      background: none;
      border: none;
      font-size: 0.78rem;
      color: var(--purple);
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }
    .expand-btn:hover { text-decoration: underline; }

    /* Expandable section */
    .pitch-expand-area {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--gray-100);
      padding-top: 12px;
    }
    .pitch-expand-area.open { display: block; }

    /* Editable pitch fields inside pitch row */
    .pitch-edit-subject {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--purple-light);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--purple-dark);
      background: var(--purple-light);
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .pitch-edit-subject:focus { outline: none; border-color: var(--purple); background: var(--white); }

    .pitch-edit-body {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--gray-700);
      line-height: 1.7;
      background: var(--gray-50);
      resize: vertical;
      min-height: 160px;
      transition: border-color 0.2s;
    }
    .pitch-edit-body:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-light); }

    .pitch-edit-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    @media (max-width: 540px) {
      .summary-bar { grid-template-columns: 1fr 1fr; }
      .pitch-row   { grid-template-columns: 1fr; }
      .pitch-row-right { flex-direction: row; align-items: center; }
    }
  </style>
</head>
<body class="has-mobile-nav">

  <div class="page-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">get<span>Spons</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Dashboard</a>
        <a href="brands.html"    class="sidebar-link"><span class="icon">🏪</span> Find Brands</a>
        <a href="pitches.html"   class="sidebar-link active"><span class="icon">✉️</span> My Pitches</a>
        <a href="profile.html"   class="sidebar-link"><span class="icon">👤</span> Edit Profile</a>
      </nav>
      <div class="sidebar-bottom">
        <button class="btn btn-ghost btn-full btn-sm" id="logoutBtn">Log out</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <h1 class="page-title">My Pitches</h1>
      <p class="page-subtitle">Track every brand outreach. Edit, copy, and update statuses as you hear back.</p>

      <!-- Summary bar -->
      <div class="summary-bar" id="summaryBar">
        <div class="sum-card"><div class="sum-num" id="cntTotal">—</div><div class="sum-label">Total</div></div>
        <div class="sum-card"><div class="sum-num" id="cntSent" style="color:var(--purple)">—</div><div class="sum-label">Sent</div></div>
        <div class="sum-card"><div class="sum-num" id="cntReplied" style="color:var(--gold)">—</div><div class="sum-label">Replied</div></div>
        <div class="sum-card"><div class="sum-num" id="cntDeal" style="color:var(--green)">—</div><div class="sum-label">Deals 🎉</div></div>
      </div>

      <!-- Pitch list -->
      <div id="pitchList">
        <div class="pitch-row"><div class="skeleton" style="height:60px"></div></div>
        <div class="pitch-row"><div class="skeleton" style="height:60px"></div></div>
        <div class="pitch-row"><div class="skeleton" style="height:60px"></div></div>
      </div>
    </main>
  </div>

  <!-- Mobile nav -->
  <nav class="mobile-nav">
    <a href="dashboard.html"><span class="icon">🏠</span>Home</a>
    <a href="brands.html"><span class="icon">🏪</span>Brands</a>
    <a href="pitches.html" class="active"><span class="icon">✉️</span>Pitches</a>
    <a href="profile.html"><span class="icon">👤</span>Profile</a>
  </nav>

  <script type="module">
    import { API, getToken } from './js/api.js';

    if (!getToken()) window.location.href = 'login.html';
    document.getElementById('logoutBtn')?.addEventListener('click', () => API.logout());

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderSummary(pitches) {
      document.getElementById('cntTotal').textContent   = pitches.length;
      document.getElementById('cntSent').textContent    = pitches.filter(p => p.status === 'sent').length;
      document.getElementById('cntReplied').textContent = pitches.filter(p => p.status === 'replied').length;
      document.getElementById('cntDeal').textContent    = pitches.filter(p => p.status === 'deal').length;
    }

    function renderPitches(pitches) {
      const el = document.getElementById('pitchList');

      if (!pitches.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">✉️</div>
            <p>You haven't pitched any brands yet. Go to Browse Brands to get started.</p>
            <a href="brands.html" class="btn btn-primary btn-sm">Browse Brands →</a>
          </div>`;
        return;
      }

      el.innerHTML = pitches.map((p) => `
        <div class="pitch-row" id="row-${p.id}">
          <div>
            <div class="pitch-row-brand">${escHtml(p.brands?.name || 'Unknown Brand')}</div>
            <div class="pitch-row-subject" id="subj-display-${p.id}">${escHtml(p.subject)}</div>
            <div class="pitch-row-date">${fmtDate(p.created_at)}</div>

            <button class="expand-btn" id="expandBtn-${p.id}" onclick="toggleExpand('${p.id}')">✏️ Edit / View email ▾</button>

            <!-- Editable expand area -->
            <div class="pitch-expand-area" id="expand-${p.id}">
              <div style="font-size:0.72rem;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Subject Line</div>
              <input class="pitch-edit-subject" id="subj-${p.id}" type="text" value="${escHtml(p.subject)}" placeholder="Subject line" />

              <div style="font-size:0.72rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Email Body</div>
              <textarea class="pitch-edit-body" id="body-${p.id}" placeholder="Email body">${escHtml(p.body)}</textarea>

              <div class="alert" id="pitchAlert-${p.id}" style="margin-top:8px;font-size:0.8rem"></div>

              <div class="pitch-edit-actions">
                <button class="btn btn-primary btn-sm" id="saveBtn-${p.id}" onclick="savePitch('${p.id}')">💾 Save Changes</button>
                <button class="btn btn-outline btn-sm" onclick="copyPitch('${p.id}')">📋 Copy Email</button>
              </div>
            </div>
          </div>

          <div class="pitch-row-right">
            <select
              class="status-select"
              id="status-${p.id}"
              onchange="updateStatus('${p.id}', this.value)"
            >
              <option value="draft"   ${p.status==='draft'   ? 'selected':''}>📝 Draft</option>
              <option value="sent"    ${p.status==='sent'    ? 'selected':''}>📤 Sent</option>
              <option value="replied" ${p.status==='replied' ? 'selected':''}>💬 Replied</option>
              <option value="deal"    ${p.status==='deal'    ? 'selected':''}>🎉 Deal!</option>
            </select>
          </div>
        </div>
      `).join('');
    }

    // ── Toggle expand ─────────────────────────────────────────────────
    window.toggleExpand = function(id) {
      const area = document.getElementById(`expand-${id}`);
      const btn  = document.getElementById(`expandBtn-${id}`);
      const open = area.classList.toggle('open');
      btn.textContent = open ? '✏️ Hide email ▴' : '✏️ Edit / View email ▾';
    };

    // ── Save pitch edits ──────────────────────────────────────────────
    window.savePitch = async function(id) {
      const btn     = document.getElementById(`saveBtn-${id}`);
      const alert   = document.getElementById(`pitchAlert-${id}`);
      const subject = document.getElementById(`subj-${id}`)?.value?.trim() || '';
      const body    = document.getElementById(`body-${id}`)?.value?.trim() || '';

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        await API.updatePitchContent(id, subject, body);
        // Update display subject
        const dispEl = document.getElementById(`subj-display-${id}`);
        if (dispEl) dispEl.textContent = subject;

        alert.textContent = '✅ Saved!';
        alert.className = 'alert alert-success show';
        setTimeout(() => alert.classList.remove('show'), 3000);
      } catch (err) {
        alert.textContent = err.message || 'Could not save.';
        alert.className = 'alert alert-error show';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '💾 Save Changes';
      }
    };

    // ── Copy pitch email to clipboard ─────────────────────────────────
    window.copyPitch = async function(id) {
      const subject = document.getElementById(`subj-${id}`)?.value || '';
      const body    = document.getElementById(`body-${id}`)?.value || '';
      try {
        await navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`);
        const btn = document.querySelector(`#row-${id} [onclick*="copyPitch"]`);
        if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy Email', 2000); }
        // Mark as sent
        await API.updatePitchStatus(id, 'sent').catch(() => {});
        const sel = document.getElementById(`status-${id}`);
        if (sel) sel.value = 'sent';
      } catch (_) {
        alert('Copy failed. Select the email body text and copy manually.');
      }
    };

    // ── Update status ─────────────────────────────────────────────────
    window.updateStatus = async function(pitchId, newStatus) {
      try {
        await API.updatePitchStatus(pitchId, newStatus);
        loadPitches();
      } catch (err) {
        alert(`Could not update status: ${err.message}`);
        loadPitches();
      }
    };

    // ── Load pitches ──────────────────────────────────────────────────
    async function loadPitches() {
      try {
        const pitches = await API.getMyPitches();
        renderSummary(pitches);
        renderPitches(pitches);
      } catch (err) {
        document.getElementById('pitchList').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <p>${escHtml(err.message) || 'Could not load pitches.'}</p>
          </div>`;
      }
    }

    loadPitches();
  </script>
</body>
</html>
