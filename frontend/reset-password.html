<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — getSpons</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body {
      background: var(--gray-50);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--purple);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--gold); }

    .auth-tagline {
      text-align: center;
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-bottom: 28px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--gray-500);
    }
    .auth-footer a { color: var(--purple); font-weight: 600; }

    .no-token-msg {
      text-align: center;
      padding: 24px 0;
      color: var(--gray-500);
    }
    .no-token-msg .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* Password toggle */
    .input-password-wrap { position: relative; }
    .input-password-wrap .form-input { padding-right: 44px; }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .password-toggle:hover { color: var(--purple); }
    .password-toggle svg { width: 18px; height: 18px; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">get<span>Spons</span></div>
    <p class="auth-tagline">Set your new password</p>

    <div class="alert" id="alertBox"></div>

    <!-- Shown if no token found in URL hash -->
    <div id="noTokenMsg" class="no-token-msg" style="display:none">
      <div class="icon">🔑</div>
      <p style="margin-bottom:16px">This link is invalid or has expired. Please request a new password reset link.</p>
      <a href="login.html" class="btn btn-primary btn-sm">Back to Login</a>
    </div>

    <form class="auth-form" id="resetForm">

      <!-- New password with toggle -->
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <div class="input-password-wrap">
          <input
            class="form-input"
            type="password"
            id="newPassword"
            placeholder="At least 6 characters"
            minlength="6"
            required
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" id="pwToggle1" aria-label="Show password">
            <svg id="eye1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eyeOff1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm password with toggle -->
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-password-wrap">
          <input
            class="form-input"
            type="password"
            id="confirmPassword"
            placeholder="Repeat your new password"
            minlength="6"
            required
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" id="pwToggle2" aria-label="Show password">
            <svg id="eye2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eyeOff2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
        Reset Password
      </button>
    </form>

    <p class="auth-footer">
      Remembered it? <a href="login.html">Back to Login</a>
    </p>
  </div>

  <script type="module">
    import { BASE_URL } from './js/api.js';

    const alertBox   = document.getElementById('alertBox');
    const resetForm  = document.getElementById('resetForm');
    const submitBtn  = document.getElementById('submitBtn');
    const noTokenMsg = document.getElementById('noTokenMsg');

    // ── Extract access_token from URL hash ────────────────────────────
    function getHashParam(key) {
      const params = new URLSearchParams(window.location.hash.substring(1));
      return params.get(key);
    }

    const accessToken = getHashParam('access_token');

    if (!accessToken) {
      resetForm.style.display = 'none';
      noTokenMsg.style.display = 'block';
    }

    // ── Password toggles (helper function to wire up each pair) ───────
    function wireToggle(inputId, toggleId, eyeId, eyeOffId) {
      const input  = document.getElementById(inputId);
      const toggle = document.getElementById(toggleId);
      const eye    = document.getElementById(eyeId);
      const eyeOff = document.getElementById(eyeOffId);

      toggle.addEventListener('click', () => {
        const hidden = input.type === 'password';
        input.type = hidden ? 'text' : 'password';
        eye.style.display    = hidden ? 'none' : '';
        eyeOff.style.display = hidden ? ''     : 'none';
      });
    }

    wireToggle('newPassword',     'pwToggle1', 'eye1', 'eyeOff1');
    wireToggle('confirmPassword', 'pwToggle2', 'eye2', 'eyeOff2');

    // ── Helpers ───────────────────────────────────────────────────────
    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
    }
    function showSuccess(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-success show';
    }

    // ── Form submit ───────────────────────────────────────────────────
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showError('Passwords do not match. Please try again.');
        return;
      }
      if (newPassword.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Resetting…';

      try {
        const res = await fetch(`${BASE_URL}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: accessToken, new_password: newPassword }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Failed to reset password.');

        showSuccess('✅ Password reset! Redirecting you to login…');
        setTimeout(() => window.location.href = 'login.html', 1800);

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
