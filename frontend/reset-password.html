<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — getSpons</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { background: var(--gray-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--purple);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--gold); }

    .auth-tagline {
      text-align: center;
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-bottom: 28px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--gray-500);
    }
    .auth-footer a { color: var(--purple); font-weight: 600; }

    .no-token-msg {
      text-align: center;
      padding: 24px 0;
      color: var(--gray-500);
    }
    .no-token-msg .icon { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">get<span>Spons</span></div>
    <p class="auth-tagline">Set your new password</p>

    <div class="alert" id="alertBox"></div>

    <!-- Shown if no token found -->
    <div id="noTokenMsg" class="no-token-msg" style="display:none">
      <div class="icon">🔑</div>
      <p style="margin-bottom:16px">This link is invalid or has expired. Please request a new password reset link.</p>
      <a href="login.html" class="btn btn-primary btn-sm">Back to Login</a>
    </div>

    <form class="auth-form" id="resetForm">
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input
          class="form-input"
          type="password"
          id="newPassword"
          placeholder="At least 6 characters"
          minlength="6"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input
          class="form-input"
          type="password"
          id="confirmPassword"
          placeholder="Repeat your new password"
          minlength="6"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
        Reset Password
      </button>
    </form>

    <p class="auth-footer">
      Remembered it? <a href="login.html">Back to Login</a>
    </p>
  </div>

  <script type="module">
    import { BASE_URL } from './js/api.js';

    const alertBox  = document.getElementById('alertBox');
    const resetForm = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');
    const noTokenMsg = document.getElementById('noTokenMsg');

    // ── Extract access_token from URL hash ────────────────────────────
    // Supabase puts it as: #access_token=xxx&type=recovery&...
    function getHashParam(key) {
      const hash = window.location.hash.substring(1); // strip leading #
      const params = new URLSearchParams(hash);
      return params.get(key);
    }

    const accessToken = getHashParam('access_token');

    if (!accessToken) {
      // No token — show error state, hide form
      resetForm.style.display = 'none';
      noTokenMsg.style.display = 'block';
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
    }
    function showSuccess(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-success show';
    }

    // ── Form submit ───────────────────────────────────────────────────
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Client-side validation
      if (newPassword !== confirmPassword) {
        showError('Passwords do not match. Please try again.');
        return;
      }
      if (newPassword.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Resetting…';

      try {
        const res = await fetch(`${BASE_URL}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: accessToken, new_password: newPassword }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || 'Failed to reset password.');
        }

        showSuccess('✅ Password reset! Redirecting you to login…');
        setTimeout(() => window.location.href = 'login.html', 1800);

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
