<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — getSpons</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { background: var(--gray-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--purple);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--gold); }

    .auth-tagline {
      text-align: center;
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-bottom: 28px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--gray-500);
    }
    .auth-footer a { color: var(--purple); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">get<span>Spons</span></div>
    <p class="auth-tagline">Create your free creator account</p>

    <!-- Error / Success messages -->
    <div class="alert alert-error" id="alertBox"></div>

    <form class="auth-form" id="signupForm">

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="At least 6 characters"
          minlength="6"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
        Create account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>

  <script type="module">
    import { API, getToken } from './js/api.js';

    // If user is already logged in, redirect to dashboard
    if (getToken()) window.location.href = 'dashboard.html';

    const form      = document.getElementById('signupForm');
    const alertBox  = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    // ── Show / hide error message ─────────────────────────────────────
    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
    }
    function showSuccess(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-success show';
    }

    // ── Form submit ───────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Creating account…';

      try {
        const result = await API.signup(email, password);

        // Backend returns { success: true, user_id: "..." }
        if (result.success) {
          showSuccess('Account created! Redirecting you to log in…');
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          // Backend returned { error: "..." }
          showError(result.error || 'Signup failed. Please try again.');
        }

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
