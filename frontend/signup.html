<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — getSpons</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { background: var(--gray-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--purple);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--gold); }

    .auth-tagline {
      text-align: center;
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-bottom: 28px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--gray-500);
    }
    .auth-footer a { color: var(--purple); font-weight: 600; }

    /* Onboarding steps indicator */
    .onboarding-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--gray-300);
      font-weight: 600;
    }
    .step.active { color: var(--purple); }
    .step.done   { color: var(--green); }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--gray-200);
      color: var(--gray-500);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step.active .step-num { background: var(--purple); color: #fff; }
    .step-sep { width: 24px; height: 1.5px; background: var(--gray-200); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">get<span>Spons</span></div>
    <p class="auth-tagline">Create your free creator account</p>

    <!-- Onboarding progress indicator -->
    <div class="onboarding-steps">
      <div class="step active">
        <div class="step-num">1</div>
        Create Account
      </div>
      <div class="step-sep"></div>
      <div class="step">
        <div class="step-num">2</div>
        Your Profile
      </div>
      <div class="step-sep"></div>
      <div class="step">
        <div class="step-num">3</div>
        Media Kit
      </div>
    </div>

    <!-- Error / Success messages -->
    <div class="alert" id="alertBox"></div>

    <form class="auth-form" id="signupForm">

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="At least 6 characters"
          minlength="6"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
        Create account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>

  <script type="module">
    import { API, getToken, saveToken, saveUserId } from './js/api.js';

    // If user is already logged in, redirect to dashboard
    if (getToken()) window.location.href = 'dashboard.html';

    const form      = document.getElementById('signupForm');
    const alertBox  = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    // ── Show / hide messages ──────────────────────────────────────────
    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
    }
    function showSuccess(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-success show';
    }

    // ── Form submit ───────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Creating account…';

      try {
        const result = await API.signup(email, password);

        if (result.success) {
          // Auto-login after signup so user lands on profile with a session
          showSuccess('Account created! Logging you in…');

          try {
            // Attempt immediate login so they have a token for profile page
            await API.login(email, password);
          } catch (_) {
            // If auto-login fails, that's okay; redirect to login page instead
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
          }

          // ✅ Redirect to profile.html to complete onboarding
          showSuccess('✅ Account created! Let\'s set up your profile…');
          setTimeout(() => window.location.href = 'profile.html', 1200);

        } else {
          showError(result.error || 'Signup failed. Please try again.');
        }

      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
