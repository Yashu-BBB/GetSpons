<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — getSpons</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body {
      background: var(--gray-50);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .auth-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--purple);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--gold); }

    .auth-tagline {
      text-align: center;
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-bottom: 28px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--gray-500);
    }
    .auth-footer a { color: var(--purple); font-weight: 600; }

    /* Password toggle wrapper */
    .input-password-wrap {
      position: relative;
    }
    .input-password-wrap .form-input {
      padding-right: 44px; /* space for toggle button */
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-500);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .password-toggle:hover { color: var(--purple); }
    .password-toggle svg { width: 18px; height: 18px; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">get<span>Spons</span></div>
    <p class="auth-tagline">Welcome back 👋</p>

    <div class="alert" id="alertBox"></div>

    <form class="auth-form" id="loginForm">

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <!-- Password input with show/hide toggle -->
        <div class="input-password-wrap">
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="Your password"
            required
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle" id="pwToggle" aria-label="Toggle password visibility">
            <!-- Eye icon (visible state) -->
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                   -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <!-- Eye-off icon (hidden state) — shown when password is visible -->
            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7
                   a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                   M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29
                   M3 3l18 18"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
        Log in
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </p>
    <p class="auth-footer" style="margin-top:8px">
      <a href="reset-password.html">Forgot password?</a>
    </p>
  </div>

  <script type="module">
    import { API, getToken } from './js/api.js';

    // Already logged in → skip to dashboard
    if (getToken()) window.location.href = 'dashboard.html';

    const form      = document.getElementById('loginForm');
    const alertBox  = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    // ── Password show/hide toggle ─────────────────────────────────────
    const pwInput    = document.getElementById('password');
    const pwToggle   = document.getElementById('pwToggle');
    const eyeIcon    = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    pwToggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      eyeIcon.style.display    = isHidden ? 'none'  : '';
      eyeOffIcon.style.display = isHidden ? ''      : 'none';
      pwToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    // ── Error helper ──────────────────────────────────────────────────
    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
    }

    // ── Form submit ───────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Logging in…';

      try {
        const result = await API.login(email, password);

        if (result.access_token) {
          window.location.href = 'dashboard.html';
        } else {
          showError(result.error || 'Login failed. Check your credentials.');
        }

      } catch (err) {
        showError(err.message || 'Invalid email or password.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
